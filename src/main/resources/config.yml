  item-disable: "&cDisable this effect"

  cherry: "&dCherry"
  endrod: "&fEndrod"
  totem: "&eTotem"
  heart: "&cHeart"
  pale: "&8Pale"
  purple: "&5Purple"
  note: "&3Notes"

  totem_spiral: "&eTotem spiral"
  endrod_spiral: "&fEndrod spiral"
  cherry_spiral: "&dCherry spiral"
  pale_spiral: "&8Pale spiral"
  purple_spiral: "&5Purple spiral"
  note_spiral: "&3 Note spiral"

