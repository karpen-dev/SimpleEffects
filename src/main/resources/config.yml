# SimpleEffects - https://github.com/karpen-dev/SimpleEffects

# Config version
# Don't change this parameter
config-version: 7.0

# For change color use ampersand and §
# Example &fHello or §fWorld

# Plugin language - ru, en, jp, be
lang: en

update:
  using: true
  msg: "&cYou do not have the latest version of the plugin installed. You can download the latest version at https://modrinth.com/plugin/simpleeffects"

# Separate rights
rights:
  using: false

  cherry: "karpen.simpleeffects.cherry"
  endrod: "karpen.simpleeffects.endrod"
  totem: "karpen.simpleeffects.totem"
  heart: "karpen.simpleeffects.heart"
  pale: "karpen.simpleeffects.pale"
  notes: "karpen.simpleeffects.notes"
  purple: "karpen.simpleeffects.purple"

  totem_spiral: "karpen.simpleefects.totem_spiral"
  endrod_spiral: "karpen.simpleefects.endrod_spiral"
  cherry_spiral: "karpen.simpleefects.cherry_spiral"
  pale_spiral: "karpen.simpleefects.pale_spiral"
  purple_spiral: "karpen.simpleefects.purple_spiral"
  note_spiral: "karpen.simpleefects.note_spiral"

# Messages

# The translation of the plugin is not perfect and may contain errors,
# I will be glad to receive feedback from X: https://x.com/akariyapl

# プラグインの翻訳は完璧ではなく、誤りが含まれている可能性があります。
# X: https://x.com/akariyapl からのフィードバックをお待ちしております。

# Перевод плагина не идеальный и может содержать ошибки,
# буду рад фитбеку X: https://x.com/akariyapl

